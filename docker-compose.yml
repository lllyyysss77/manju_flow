version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manju-flow-backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - SERVER_PORT=8080
      - DB_DRIVER=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=manjuflow
      - DB_PASSWORD=manjuflow123
      - DB_NAME=manju_flow
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - manju-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: manju-flow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - manju-network

  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: manju-flow-db
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=manju_flow
      - MYSQL_USER=manjuflow
      - MYSQL_PASSWORD=manjuflow123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - manju-network

networks:
  manju-network:
    driver: bridge

volumes:
  mysql_data:
